<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkout • Cristal Bags</title>
<link rel="stylesheet" href="/css/style.css" />
<style>
body {
  margin:0;
  font-family: inherit;
  background: linear-gradient(135deg,#f8cdda,#c2e9fb,#fbc2eb);
  min-height:100vh;
}

.checkout-wrapper{
  max-width:1100px;
  margin:60px auto;
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:40px;
  padding:20px;
}

.card{
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  border-radius:24px;
  padding:32px;
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

h2{
  margin-top:0;
  font-weight:600;
}

.input-group{
  margin-bottom:18px;
}

input{
  width:100%;
  padding:14px 16px;
  border-radius:14px;
  border:1px solid rgba(0,0,0,0.08);
  background:white;
  font-size:15px;
}

.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.summary-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:12px;
  font-size:14px;
}

.total{
  margin-top:20px;
  font-weight:600;
  font-size:18px;
  display:flex;
  justify-content:space-between;
}

.checkout-btn{
  margin-top:25px;
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  background:linear-gradient(90deg,#ff9a9e,#fad0c4);
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.checkout-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

@media(max-width:900px){
  .checkout-wrapper{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="checkout-wrapper">

  <div class="card">
    <h2>Informações de Entrega</h2>

    <div class="input-group">
      <input id="name" placeholder="Nome completo" required />
    </div>

    <div class="input-group">
      <input id="email" type="email" placeholder="Email" required />
    </div>

    <div class="input-group">
      <input id="phone" placeholder="Telefone" required />
    </div>

    <div class="grid-2">
      <input id="street" placeholder="Rua" required />
      <input id="number" placeholder="Número" required />
    </div>

    <div class="grid-2" style="margin-top:14px;">
      <input id="city" placeholder="Cidade" required />
      <input id="state" placeholder="Estado" required />
    </div>

    <div class="input-group" style="margin-top:14px;">
      <input id="zip" placeholder="CEP" required />
    </div>

    <button class="checkout-btn" id="confirmBtn">
      Finalizar Compra
    </button>
  </div>

  <div class="card">
    <h2>Resumo do Pedido</h2>
    <div id="summary"></div>
    <div class="total">
      <span>Total</span>
      <span id="total"></span>
    </div>
  </div>

</div>

<script>
const raw = localStorage.getItem("cb_cart_v2");
const parsed = raw ? JSON.parse(raw) : null;
const cart = (parsed && parsed.items) ? parsed.items : [];

if(!cart.length){
  window.location.href = "/";
}

const summaryEl = document.getElementById("summary");
const totalEl = document.getElementById("total");

let total = 0;

function parsePriceToCents(value){
  if(value === null || value === undefined) return 0;
  if(typeof value === 'number' && isFinite(value)) return Math.round(value*100);
  const s = String(value).trim();
  if(!s) return 0;
  const m = s.match(/(\d+[.,]?\d*)/);
  if(!m) return 0;
  const norm = m[1].replace(/\./g,'').replace(',', '.');
  const n = Number(norm);
  if(!isFinite(n) || n<=0) return 0;
  return Math.round(n*100);
}

async function buildSummary() {
  // Load products from API (same source as catalog)
  const res = await fetch("/api/products", { cache: "no-store" });
  const products = await res.json();

  cart.forEach(item => {
    const product = products.find(p => p.sku === item.sku);
    if (!product) return;

const price = (product.price_cents != null && Number(product.price_cents) > 0)
  ? Number(product.price_cents)
  : parsePriceToCents(product.price);
    const qty = Number(item.qty || 1);
    const lineTotal = price * qty;

    const div = document.createElement("div");
    div.className = "summary-item";
    div.innerHTML = `
      <span>${product.name} x${qty}</span>
      <span>R$ ${(lineTotal / 100).toFixed(2)}</span>
    `;

    summaryEl.appendChild(div);
    total += lineTotal;
  });

  totalEl.textContent = "R$ " + (total / 100).toFixed(2);
}

buildSummary();
  
async function startCheckout(items){
  const res = await fetch("/api/create-preference", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ items })
  });

  if(!res.ok){
    const text = await res.text();
    throw new Error(text || "Erro ao iniciar pagamento.");
  }

  return res.json();
}
  
document.getElementById("confirmBtn").addEventListener("click", async ()=>{

  const requiredFields = ["name","email","phone","street","number","city","state","zip"];

  for(const id of requiredFields){
    if(!document.getElementById(id).value.trim()){
      alert("Preencha todos os campos.");
      return;
    }
  }

  const shippingData = {
    name: name.value,
    email: email.value,
    phone: phone.value,
    street: street.value,
    number: number.value,
    city: city.value,
    state: state.value,
    zip: zip.value
  };

  localStorage.setItem("cb_shipping", JSON.stringify(shippingData));

  trconst data = await fetch("/api/create-preference", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    items: cart,
    shipping: shippingData
  })
}).then(r => r.json());
    if(data && data.checkout_url){
      window.location.href = data.checkout_url;
    } else {
      alert("Erro ao iniciar pagamento.");
    }
  }catch(e){
    alert("Erro ao iniciar pagamento.");
  }

});
</script>

</body>
</html>
